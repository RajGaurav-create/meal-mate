{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

    <h1 class="title">Welcome {{ username }}!</h1>

    <div class="top-bar">
        <a href="{% url 'show_cart' username %}" class="cart-btn">
            🛒 Go to Cart
        </a>
    </div>

    <div class="container">

        <table class="menu-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Image</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Veg</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for item in itemList %}
                <tr>
                    <td>{{ item.name }}</td>

                    <td>
                        <img src="{{ item.picture }}" class="item-img">
                    </td>

                    <td>{{ item.description }}</td>

                    <td class="price">₹{{ item.price }}</td>

                    <td>
                        {% if item.vegeterian %}
                            <span class="veg">✔</span>
                        {% else %}
                            <span class="non-veg">✖</span>
                        {% endif %}
                    </td>

                    <td>
                        <a href="{% url 'add_to_cart' item.id username %}" class="add-btn">
                            Add to Cart
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</body>
</html>
